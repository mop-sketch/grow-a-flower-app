<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Grow a Flower</title>
    <link rel="stylesheet" type="text/css" href="fonts.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="script.js"></script>
    <script src="game.js"></script>
    <script src="tutorial.js"></script>

</head>
<body class="container" >
    <p id="spring1" class="spring1" style="display:none;">⚙</p>
    <p id="spring2" class="spring2" style="display:none;">⚙</p>
    <audio id="win-audio" src="music and images/Winning-sound.mp3"></audio>
    <audio id="dark-audio" src="music and images/Dark-music.mp3" loop></audio>
    <audio id="music-audio" src="music and images/Peaceful-Music.mp3" loop></audio>
    <audio id="grow-audio" src="music and images/Plant Growing.mp3"></audio>
    <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>
    <h1 class="title" data-text="Grow a Flower">Grow a Flower</h1>
    <div class="flower" id="flower">
        <div class="fertilizer-notification"></div>
        <img src="flower/Seed.png" alt="Flower" id="flower-image">
    </div>
    <p id="status">Fertilizer is at unsafe levels&#x274C;</p>
    <p id="score">Score: 0 &nbsp;&nbsp; Best: 0</p>
    <div id="controls-container">
        <div class="meters">
            <div class="meter-row">
                <span class="meter-label">Water&#128167;</span>
                <div class="meter-bar"><div class="fertilizer-safe-zone"></div><div id="water-bar" class="meter-fill water-fill" style="width:50%"></div></div>
            </div>
            <div class="meter-row">
                <span class="meter-label">Sunlight&#9728;&#65039;</span>
                <div class="meter-bar"><div class="fertilizer-safe-zone"></div><div id="sun-bar" class="meter-fill sun-fill" style="width:50%"></div></div>
            </div>
            <div id="warmth-row" class="warmth-row">
                <span class="meter-label">Warmth&#128293;&#65039;</span>
                <div class="meter-bar"><div class="fertilizer-safe-zone"></div><div id="warmth-bar" class="meter-fill warmth-fill" style="width:50%"></div></div>
            </div>
            <div class="health-row" id="health-row">
                <span class="health-label">Health&#10084;&#65039;</span>
                <div class="health-bar"><div id="health-bar" class="meter-fill health-fill" style="width:100%"></div></div>
            </div>
        </div>
        <div class="buttons-container">
            <button id="water-btn" class="water-button">Water</button>
            <button id="sun-btn" class="sun-button">Sunlight</button>
            <button id="warmth-btn" class="warmth-button">Warmth</button>
        </div>
        <button id="fertilizer-btn" class="fertilizer-button">Fertilizer</button>
    </div>
    <div id="upgrade-container" class="upgrade-container">
        <div class="upgrade-menu" id="upgrade-menu">
            <h2 style="margin:0 0 4px 0;text-align:center;">&#127807; Stage Reward!</h2>
            <p style="text-align:center;margin:0 0 8px 0;font-size:13px;color:#7a5c2e;">Choose one upgrade for your plant</p>
            <div class="option-container">
                <div class="upgrade-option" id="upgrade-option"></div>
                <div class="upgrade-option1" id="upgrade-option1"></div>
                <div class="upgrade-option2" id="upgrade-option2"></div>
            </div>
        </div>
    </div>
    <div class="menu-container" id="menu-container">
        <div id="menu" class="menu">
            <div class="menu-title-area">
                <span class="menu-leaf">&#127800;</span>
                <span class="menu-title-text">Grow a Flower</span>
                <span class="menu-leaf">&#127800;</span>
            </div>
            <hr class="menu-divider">
            <button id="how-to-play-btn" class="menu-button"> How to Play</button>
            <button id="learn-more-btn" onclick="window.location.href='learn more.html'" class="menu-button"> Learn More</button>
            <button id="restart-btn" class="menu-button"> Restart</button>
            <button id="lore-btn" class="menu-button"> ???</button>
        </div>
    </div>
    <button id="main-menu-btn" class="main-menu-button">&equiv;</button>
    <button id="music-btn" onclick="toggleMusic()" class="music-button">&#x1F507;</button>
    <div class="difficulty-container" id="difficulty-container">
        <div class="menu difficulty-menu">
            <div class="menu-title-area">
                <span class="menu-leaf">&#127807;</span>
                <span class="menu-title-text">Choose Difficulty</span>
                <span class="menu-leaf">&#127807;</span>
            </div>
            <hr class="menu-divider">
            <button id="easy-btn" class="menu-button difficulty-button easy">
                <span class="diff-name">&#127793; Easy</span>
                <span class="diff-desc">Gentle pace, forgiving conditions</span>
            </button>
            <button id="medium-btn" class="menu-button difficulty-button medium">
                <span class="diff-name">&#127807; Medium</span>
                <span class="diff-desc">Faster decay, harsher weather &amp; pests</span>
            </button>
            <button id="hard-btn" class="menu-button difficulty-button hard">
                <span class="diff-name">&#127797; Hard</span>
                <span class="diff-desc">Like Medium, but stages take far longer</span>
            </button>
        </div>
    </div>
</body>
